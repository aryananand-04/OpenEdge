<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEdge - Frame Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OpenEdge Frame Viewer</h1>
            <p>Real-time processed camera frames</p>
        </header>

        <main>
            <div class="canvas-container">
                <canvas id="frameCanvas" width="640" height="480"></canvas>
            </div>

            <div class="controls">
                <button id="loadSampleBtn">Load Sample Frame</button>
                <button id="clearBtn">Clear</button>
            </div>

            <div class="info">
                <h2>Frame Statistics</h2>
                <div id="statsDisplay">
                    <p>FPS: <span id="fpsValue">0</span></p>
                    <p>Resolution: <span id="resolutionValue">640x480</span></p>
                    <p>Frame Count: <span id="frameCountValue">0</span></p>
                </div>
            </div>
        </main>

        <footer>
            <p>OpenEdge - OpenCV + OpenGL ES Processing</p>
        </footer>
    </div>

    <script type="module" src="../dist/index.js"></script>
</body>
</html>
